<section class="login-page">
  <div class="login-img"></div>

  <div class="login-card">
    <h1>Recuperar contraseña</h1>
    <p>Escribe tu correo para enviarte un enlace de recuperación</p>

    <input type="email" placeholder="Correo electrónico">

    <button (click)="enviarRecuperacion()">Enviar enlace</button>

    <p class="mensaje" *ngIf="mensaje">
      {{ mensaje }}
    </p>

    <p>
      <a routerLink="/login">← Volver a iniciar sesión</a>
    </p>
  </div>
</section><p>recuperar works!</p>
