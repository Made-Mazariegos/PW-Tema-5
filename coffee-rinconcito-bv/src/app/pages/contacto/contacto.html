<section class="contacto-page">
  <div class="bloque nosotros">
    <h1>Sobre nosotros</h1>
    <p>
      Coffee Rinconcito BV es una plataforma que conecta a productores de café
      de Bella Vista con clientes que buscan café artesanal, fresco y de calidad.
    </p>

    <button routerLink="/inicio" class="btn-volver">
      ← Regresar al inicio
    </button>
  </div>

  <div class="bloque contacto">
    <h1>Contáctanos</h1>
    <p>📍 Bella Vista, Chiapas, México</p>
    <p>📞 961 123 4567</p>
    <p>✉️ admin&#64;coffeerinconcitobv.com</p>
  </div>

  <div class="bloque mensaje">
    <h1>Envíanos un mensaje</h1>

    <input 
      type="text" 
      placeholder="Nombre"
      [(ngModel)]="nombre">

    <input 
      type="email" 
      placeholder="Correo electrónico"
      [(ngModel)]="correo">

    <textarea 
      placeholder="Mensaje"
      [(ngModel)]="mensaje">
    </textarea>

    <button (click)="enviarMensaje()">Enviar mensaje</button>

    <p class="aviso">{{ aviso }}</p>
  </div>
</section>
