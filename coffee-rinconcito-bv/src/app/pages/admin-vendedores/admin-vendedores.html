<section class="admin-detalle">
  <h1>🧑‍🌾 Solicitudes de vendedores</h1>

  <table>
    <tr>
      <th>Productor</th>
      <th>Café</th>
      <th>Pago</th>
      <th>Estado</th>
      <th>Acción</th>
    </tr>

    <tr>
      <td>Don José</td>
      <td>Café Sierra Verde</td>
      <td>$100</td>
      <td>Pendiente</td>
      <td>
        <button (click)="aprobarVendedor()">Aprobar</button>
      </td>
    </tr>

    <tr>
      <td>Doña María</td>
      <td>Café Orgánico BV</td>
      <td>$100</td>
      <td>Pagado</td>
      <td>
        <button (click)="verVendedor()">Ver</button>
      </td>
    </tr>
  </table>

  <button routerLink="/admin" class="btn-volver">
    ← Volver al panel
  </button>
</section>
